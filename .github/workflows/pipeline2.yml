on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 
jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug - Show directory structure
        run: |
          echo "Current working directory:"
          pwd
          echo "Listing all files (recursive):"
          ls -R
      - name: Install Dependencies
        run: |
          pip install "numpy<2"
          pip install -r superkart_project/deployment/requirements.txt
# ADD DEBUG STEP HERE
      - name: Debug Token Presence
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is empty! Check your GitHub Secrets."
            exit 1
          else
            echo "Success: HF_TOKEN is found."
            echo "Length of token: ${#HF_TOKEN} characters"
            echo "First 3 characters: ${HF_TOKEN:0:3}..."
          fi
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python superkart_project/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug - Show directory structure
        run: |
          echo "Current working directory:"
          pwd
          echo "Listing all files (recursive):"
          ls -R
      - name: Install Dependencies
        run: |
          pip install "numpy<2"
          pip install -r superkart_project/deployment/requirements.txt
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python superkart_project/model_building/prep.py


  model-traning:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug - Show directory structure
        run: |
          echo "Current working directory:"
          pwd
          echo "Listing all files (recursive):"
          ls -R
      - name: Install Dependencies
        run: |
          pip install "numpy<2"
          pip install -r superkart_project/deployment/requirements.txt
      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5001 &  # Run MLflow UI in the background
          sleep 5  # Wait for a moment to let the server starts
      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python superkart_project/model_building/train.py


  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-traning,data-prep,register-dataset]
    steps:
      - uses: actions/checkout@v4
      - name: Debug - Show directory structure
        run: |
          echo "Current working directory:"
          pwd
          echo "Listing all files (recursive):"
          ls -R
      - name: Install Dependencies
        run: |
          pip install "numpy<2"
          pip install -r superkart_project/deployment/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python superkart_project/hosting/hosting.py  
